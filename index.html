<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cat Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 2px solid #ddd;
        }
        h1 {
            margin-top: 15px;
            font-size: 24px;
        }
        p {
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://myblobstorage9890.blob.core.windows.net/mycontainer/Cat.jpeg.png" alt="A cute cat">
        
        <h1>Hello, Human!</h1>
        <p>Welcome to my simple web page. Just a cozy spot on the internet for a feline friend.</p>
    </div>

</body>
</html>
